<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A little something for you </title>

<style>
body { margin:0; background:black; overflow:hidden; font-family:Arial, sans-serif; }

#container {
    display:flex; justify-content:center; align-items:center; flex-direction:column;
    height:100vh; color:#ff4d6d; transition:opacity 1s ease; position:relative; z-index:10;
}

h1 { font-size:2.5rem; text-align:center; }

.input-container { position:relative; width:calc(100% - 40px); margin-inline:20px; }

.input-container input {
    width:75%; padding:14px 45px 14px 20px; font-size:1.5rem; letter-spacing:2px;
    font-weight:bold; border-radius:10px; border:2px solid #ff4d6d;
    background:black; color:white; text-align:center;
}

#togglePassword {
    position:absolute; top:50%; right:13px; transform:translateY(-50%);
    cursor:pointer; color:#ff4d6d;
}

button {
    margin-top:20px; padding:12px 30px; font-size:1.2rem;
    border-radius:12px; background:#ff4d6d; color:white; border:none;
}

#error { display:none; margin-top:15px; }

#giftScreen { display:none; }

#message {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    color:#ff4d6d; font-size:2.5rem; opacity:0; text-align:center; line-height:1.5;
}

#startButton {
    position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
    width:80px; height:80px; color:#ff4d6d;
    font-size:1.5rem; cursor:pointer; text-align:center;
}
</style>
</head>

<body>

<div id="container">
    <h1>Hi...<br>Enter Password</h1>
    <div class="input-container">
        <input type="password" id="passwordInput" placeholder="Password">
        <span id="togglePassword">👁️</span>
    </div>
    <button id="enterBtn">Enter</button>
    <div id="error">Incorrect password!</div>
</div>

<div id="giftScreen">
    <div id="message"></div>
    <div id="startButton"></div>
    <audio id="bgm" src="truecut.mp3"></audio>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
const correctPassword = "BhigTerry";
const btn = document.getElementById('enterBtn');
const input = document.getElementById('passwordInput');
const error = document.getElementById('error');

btn.addEventListener('click', () => {
    if(input.value === correctPassword){
        document.getElementById('container').style.opacity = 0;

        setTimeout(() => {
            document.getElementById('container').style.display = "none";
            document.getElementById('giftScreen').style.display = "block";
            startGift();
        }, 1000);
    } else {
        error.style.display = "block";
        input.value = "";
    }
});

document.getElementById('togglePassword').onclick = () => {
    input.type = input.type === "password" ? "text" : "password";
};

input.addEventListener('keyup', (e) => {
    if(e.key === "Enter") btn.click();
});

function startGift(){



const audio = document.getElementById('bgm');
const button = document.getElementById('startButton');
const messageElement = document.getElementById('message');

/* 🔥 YOUR FIRST LINE NOW ON BUTTON */
const firstMessage = "Hey Princess💝";
button.innerHTML = "Tap me";

/* 🔥 REST OF MESSAGES (UNCHANGED ORDER, minus first) */
const messages = [
"I made something small for you",
"Just read this slowly… it’s for you.",
"You know what I like about you?",
"You're amazing\n🔥",
"Being around you, even in my thoughts, makes everything better",
"You always find a way to lift my mood… even when you don’t realize it",
"You inspire me in ways I don’t even say out loud",
"I will always be there for you no matter what",
"I choose you\n🥰",
"You're my peace",
"My safe space",
"You're Beautiful\n😘",
"You're one in a billion",
"And yeah…",
" I\nLove\nYou\n😘"
];

let currentMessage = 0;
let opacity = 0;
let state = 'fadeIn';
let holdTime = 0;
let lastTime = Date.now();
let firstPhase = true;

button.addEventListener('click', () => {
    audio.play();
    button.style.display = 'none';

    messageElement.innerText = firstMessage;
    opacity = 0;
    state = 'fadeIn';
    animate();
});

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 50;

const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const particleMaterial = new THREE.PointsMaterial({color:0xff4d6d,size:0.5});
const particleCount = 2000;
const particlesGeometry = new THREE.BufferGeometry();
const positionsArray = new Float32Array(particleCount*3);

for(let i=0;i<particleCount;i++){
    positionsArray[i*3]=(Math.random()-0.5)*100;
    positionsArray[i*3+1]=0;
    positionsArray[i*3+2]=(Math.random()-0.5)*100;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positionsArray,3));
const particles = new THREE.Points(particlesGeometry, particleMaterial);
scene.add(particles);

function heart3D(t){
    const scale=10;
    return new THREE.Vector3(
        scale*16*Math.pow(Math.sin(t),3),
        scale*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/2,
        Math.sin(t*5)*2
    );
}

const heartPositions=[];
for(let i=0;i<particleCount;i++){
    const t=Math.random()*Math.PI*2;
    heartPositions.push(heart3D(t));
}

function updateMessage(){
    const now=Date.now();
    const delta=now-lastTime;
    lastTime=now;

    if(state==='fadeIn'){
        opacity += delta/3000;
        if(opacity>=1){ opacity=1; state='hold'; holdTime=0; }
    }
    else if(state==='hold'){
        holdTime += delta;
        if(holdTime>=5000){ state='fadeOut'; }
    }
    else if(state==='fadeOut'){
        opacity -= delta/3000;
        if(opacity<=0){
            opacity=0;

            if(firstPhase){
                firstPhase = false;
                messageElement.innerText = messages[currentMessage];
                state='fadeIn';
                return;
            }

            currentMessage++;
            if(currentMessage>=messages.length) return;

            messageElement.innerText = messages[currentMessage];
            state='fadeIn';
        }
    }

    messageElement.style.opacity = opacity;
}

function animate(){
    requestAnimationFrame(animate);

    const pos=particles.geometry.attributes.position.array;
    for(let i=0;i<particleCount;i++){
        pos[i*3]+=(heartPositions[i].x-pos[i*3])*0.02;
        pos[i*3+1]+=(heartPositions[i].y-pos[i*3+1])*0.02;
        pos[i*3+2]+=(heartPositions[i].z-pos[i*3+2])*0.02;
    }

    particles.geometry.attributes.position.needsUpdate=true;
    scene.rotation.y+=0.005;

    updateMessage();
    renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

// === FADE BACK TO PASSWORD AFTER MUSIC ENDS ===
audio.addEventListener('ended', () => {

    const fadeOverlay = document.createElement('div');
    fadeOverlay.style.position = "fixed";
    fadeOverlay.style.top = 0;
    fadeOverlay.style.left = 0;
    fadeOverlay.style.width = "100%";
    fadeOverlay.style.height = "100%";
    fadeOverlay.style.background = "black";
    fadeOverlay.style.opacity = 0;
    fadeOverlay.style.transition = "opacity 1s ease";
    fadeOverlay.style.zIndex = 9999;

    document.body.appendChild(fadeOverlay);

    // start fade to black
    setTimeout(() => {
        fadeOverlay.style.opacity = 1;
    }, 50);

    // after fade completes → reset to password UI
    setTimeout(() => {
        document.getElementById('giftScreen').style.display = "none";

        const container = document.getElementById('container');
        container.style.display = "flex";
        container.style.opacity = 0;

        setTimeout(() => {
            container.style.opacity = 1;
        }, 50);

    }, 1000 + 1000); // 1s fade + 1s pause
});

}

</script>

</body>
</html>
