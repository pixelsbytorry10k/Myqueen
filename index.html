<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: black; /* solid black background */
        color: #ff4d6d;   /* pink text */
        font-family: Arial, sans-serif;
        flex-direction: column;
        margin: 0;
    }

    #container {
        transition: opacity 1s ease;
        opacity: 1;
        text-align: center;
    }
    .container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 25px;
    width: 280px; /* controls EVERYTHING */
    }
    

    h1 {
        font-size: 2.5rem;
        margin-bottom: 30px;
    }

    .input-container {
    position: relative;
    width: 100%;
}

.input-container input {
    width: 100%;
    padding: 14px 45px 14px 20px;
    font-size: 1.5rem;        /* bigger text → bigger dots */
    letter-spacing: 5px;      /* premium spacing */
    font-weight: bold;        /* thicker dots */
    border-radius: 10px;
    border: 2px solid #ff4d6d;
    background: black;
    color: white;             /* typed password = white */
    text-align: center;
    outline: none;
    transition: all 0.3s ease;
}

/* Placeholder */
.input-container input::placeholder {
    color: white;
    opacity: 0.6;
    letter-spacing: normal; /* keeps placeholder normal */
    font-weight: normal;
}

/* Focus glow */
.input-container input:focus {
    box-shadow: 0 0 10px #ff4d6d;
    border-color: #ff4d6d;
}

/* Eye icon */
#togglePassword {
    position: absolute;
    top: 50%;
    right:13px;
    transform: translateY(-50%);
    cursor: pointer;
    color: #ff4d6d;
    font-size: 1.3rem;
    user-select: none;
    transition: transform 0.2s ease;
}

/* slight tap animation */
#togglePassword:active {
    transform: translateY(-50%) scale(0.9);
}

    

    button {
        padding: 12px 30px;
        font-size: 1.2rem;
        border: 2px solid #fff;
        border-radius: 12px;
        background: #ff4d6d;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        background: #fff;
        color: #ff4d6d;
        border: 2px solid #ff4d6d;
    }

    #error {
        color: #ff4d6d;
        margin-top: 15px;
        display: none;
        font-size: 1rem;
    }
</style>
</head>
<body>

<div class="container" id="container">
    <h1>Enter Password</h1>
    <div class="input-container">
        <input type="password" id="passwordInput" placeholder="Password">
        <span id="togglePassword">👁️</span>
    </div>
    <button id="enterBtn">Enter</button>
    <div id="error">Incorrect password!</div>
</div>

<script>
const correctPassword = "BhigTerry"; // your secret password
const btn = document.getElementById('enterBtn');
const input = document.getElementById('passwordInput');
const error = document.getElementById('error');

btn.addEventListener('click', () => {
    if(input.value === correctPassword){
        document.getElementById('container').style.opacity = 0; // fade out
        setTimeout(() => {
            window.location.href = "gift.html"; // go to gift page
        }, 1000); 
    } else {
        error.style.display = "block";
        input.value = "";
        input.focus();
    }
});


const toggle = document.getElementById('togglePassword');
const passwordInput = document.getElementById('passwordInput');

toggle.addEventListener('click', () => {
    if(passwordInput.type === "password"){
        passwordInput.type = "text";
        toggle.textContent = "🙈";
    } else {
        passwordInput.type = "password";
        toggle.textContent = "👁️";
    }
});
    
// allow pressing Enter key
input.addEventListener('keyup', (e) => {
    if(e.key === "Enter") btn.click();
});

    
</script>

</body>
</html>
